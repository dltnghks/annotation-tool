<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annotation Analysis</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f4f6f9; color: #1a1a2e; min-height: 100vh; }

header { background: #1a1a2e; color: #fff; padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
header span { font-size: 12px; color: #94a3b8; font-family: 'IBM Plex Mono', monospace; }

.container { max-width: 1200px; margin: 0 auto; padding: 24px; }

/* Load area */
#loadArea { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
#loadArea button { padding: 8px 20px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
#loadArea button:hover { background: #1d4ed8; }
#loadStatus { font-size: 13px; color: #64748b; }

/* Overview cards */
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
.card { background: #fff; border-radius: 12px; padding: 18px 20px; border: 1px solid #e5e7eb; }
.card-label { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.card-value { font-size: 28px; font-weight: 700; color: #1a1a2e; font-family: 'IBM Plex Mono', monospace; }
.card-sub { font-size: 12px; color: #64748b; margin-top: 4px; }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 20px; background: #e5e7eb; padding: 4px; border-radius: 10px; width: fit-content; }
.tab-btn { padding: 8px 20px; border-radius: 7px; border: none; background: transparent; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; color: #64748b; transition: all 0.15s; }
.tab-btn.active { background: #fff; color: #1a1a2e; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Sections */
.section { background: #fff; border-radius: 12px; border: 1px solid #e5e7eb; padding: 22px 24px; margin-bottom: 20px; }
.section-title { font-size: 15px; font-weight: 700; margin-bottom: 18px; color: #1a1a2e; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.section-title span { font-size: 11px; font-weight: 500; color: #94a3b8; font-family: 'IBM Plex Mono', monospace; }

.chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.chart-wrap canvas { max-height: 280px; }
.chart-label { font-size: 12px; color: #64748b; margin-bottom: 10px; font-weight: 500; }

/* Progress bars */
.progress-list { display: flex; flex-direction: column; gap: 10px; }
.progress-row { display: flex; align-items: center; gap: 12px; }
.progress-name { font-size: 13px; font-weight: 600; min-width: 60px; font-family: 'IBM Plex Mono', monospace; }
.progress-bar-wrap { flex: 1; background: #f1f5f9; border-radius: 6px; height: 20px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 6px; background: #2563eb; display: flex; align-items: center; padding-left: 8px; }
.progress-bar-fill span { font-size: 10px; color: #fff; font-weight: 600; white-space: nowrap; }
.progress-count { font-size: 12px; color: #64748b; min-width: 60px; text-align: right; font-family: 'IBM Plex Mono', monospace; }

/* Controls */
.controls { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
.controls label { font-size: 13px; color: #64748b; }
.controls select { padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-family: inherit; background: #fff; }
.controls input[type=range] { width: 140px; accent-color: #2563eb; }
.controls .val-display { font-size: 13px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; color: #2563eb; min-width: 36px; }

/* Timeline SVG */
.timeline-wrap { overflow-x: auto; }
.timeline-svg-wrap { min-width: 600px; }

/* Agreement */
.agreement-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
.agreement-card { background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 8px; padding: 14px 16px; }
.agreement-card .vid-id { font-size: 11px; font-family: 'IBM Plex Mono', monospace; color: #2563eb; margin-bottom: 8px; font-weight: 600; }
.agreement-score { display: flex; align-items: center; gap: 10px; }
.score-bar-wrap { flex: 1; background: #e5e7eb; border-radius: 4px; height: 8px; }
.score-bar-fill { height: 100%; border-radius: 4px; }
.score-val { font-size: 12px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; min-width: 38px; text-align: right; }

/* GT legend */
.gt-legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; font-size: 12px; }
.gt-legend-item { display: flex; align-items: center; gap: 6px; }
.gt-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

.hidden { display: none !important; }
.empty-msg { color: #aaa; font-size: 13px; text-align: center; padding: 30px 0; }
</style>
</head>
<body>

<header>
  <h1>Annotation Analysis</h1>
  <span id="lastLoaded">—</span>
</header>

<div class="container">
  <div id="loadArea">
    <button onclick="loadData()">데이터 불러오기</button>
    <span id="loadStatus"></span>
  </div>

  <div id="mainContent" class="hidden">

    <!-- Overview cards (always visible) -->
    <div class="cards">
      <div class="card">
        <div class="card-label">총 영상</div>
        <div class="card-value" id="statVideos">—</div>
        <div class="card-sub">segments</div>
      </div>
      <div class="card">
        <div class="card-label">총 어노테이션</div>
        <div class="card-value" id="statAnns">—</div>
        <div class="card-sub">boundaries</div>
      </div>
      <div class="card">
        <div class="card-label">어노테이터</div>
        <div class="card-value" id="statAnnotators">—</div>
        <div class="card-sub">명</div>
      </div>
      <div class="card">
        <div class="card-label">전체 진행률</div>
        <div class="card-value" id="statProgress">—</div>
        <div class="card-sub" id="statProgressSub"></div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('annotator')">어노테이터 중심</button>
      <button class="tab-btn" onclick="switchTab('video')">비디오 중심</button>
    </div>

    <!-- ── Tab: Annotator ── -->
    <div id="tab-annotator" class="tab-panel active">

      <div class="section">
        <div class="section-title">어노테이터별 진행 현황</div>
        <div id="progressList" class="progress-list"></div>
      </div>

      <div class="section">
        <div class="section-title">카테고리 분포</div>
        <div class="chart-row">
          <div>
            <div class="chart-label">전체 카테고리 비율</div>
            <canvas id="chartCatPie"></canvas>
          </div>
          <div>
            <div class="chart-label">어노테이터별 카테고리 분포</div>
            <canvas id="chartCatByAnnotator"></canvas>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">어노테이터 간 일치도 <span>(tolerance 기준 경계 일치율)</span></div>
        <div class="controls">
          <label>Tolerance:</label>
          <input type="range" id="agreementTol" min="1" max="10" value="3" oninput="onAgreementTolChange()">
          <span class="val-display" id="agreementTolVal">±3s</span>
        </div>
        <div id="agreementGrid" class="agreement-grid"></div>
      </div>

    </div>

    <!-- ── Tab: Video ── -->
    <div id="tab-video" class="tab-panel">

      <div class="section">
        <div class="section-title">영상별 경계 수 <span>(0초 마크 제외)</span></div>
        <div class="chart-wrap" style="overflow-x:auto;">
          <canvas id="chartBoundaryPerVideo"></canvas>
        </div>
      </div>

      <div class="section">
        <div class="section-title">영상별 카테고리 분포 <span>(stacked)</span></div>
        <div class="controls">
          <label>어노테이터:</label>
          <select id="catVideoAnnotator" onchange="renderCatByVideo()">
            <option value="all">전체</option>
          </select>
        </div>
        <div style="overflow-x:auto;">
          <canvas id="chartCatByVideo"></canvas>
        </div>
      </div>

      <div class="section">
        <div class="section-title">타임라인 비교 <span>(어노테이터별 경계 위치)</span></div>
        <div class="controls">
          <label>영상:</label>
          <select id="timelineVideo" onchange="renderTimeline()"></select>
        </div>
        <div class="timeline-wrap">
          <div id="timelineSvg" class="timeline-svg-wrap"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">GT 그래프 <span>(다수결 경계 집계)</span></div>
        <div class="controls">
          <label>영상:</label>
          <select id="gtVideo" onchange="renderGT()"></select>
          <label>Tolerance:</label>
          <input type="range" id="gtTolerance" min="1" max="15" value="3" oninput="onGTTolChange()">
          <span class="val-display" id="gtTolVal">±3s</span>
          <label>최소 동의 수:</label>
          <input type="range" id="gtMinAgree" min="1" max="5" value="2" oninput="onGTMinChange()">
          <span class="val-display" id="gtMinVal">2명</span>
        </div>
        <div class="gt-legend" id="gtLegend"></div>
        <div class="timeline-wrap">
          <div id="gtSvg" class="timeline-svg-wrap"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const WEBAPP_URL = '%%WEBAPP_URL%%';
const SECRET_TOKEN = '%%SECRET_TOKEN%%';

const CAT_COLOR = {
  'Exploration': '#6366f1', 'Combat': '#ef4444',
  'Narrative': '#f59e0b', 'Menu/UI': '#8b5cf6', 'Other': '#6b7280', '': '#cbd5e1'
};
const CATS = ['Exploration', 'Combat', 'Narrative', 'Menu/UI', 'Other'];
const ANNOTATOR_COLORS = ['#2563eb', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'];

let videoList = [], allAnns = [], annotators = [], charts = {};

function parseTimeValue(val) {
  if (val === '' || val == null) return 0;
  if (val instanceof Date) return val.getHours() * 3600 + val.getMinutes() * 60 + val.getSeconds();
  const n = Number(val);
  if (!isNaN(n)) return n;
  const parts = String(val).trim().split(':');
  if (parts.length === 2) return Number(parts[0]) * 60 + Number(parts[1]);
  if (parts.length === 3) return Number(parts[0]) * 3600 + Number(parts[1]) * 60 + Number(parts[2]);
  return 0;
}

function fmt(s) {
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

// ── Load ──
async function loadData() {
  const status = document.getElementById('loadStatus');
  status.textContent = '불러오는 중...';
  try {
    const [segRes, annRes] = await Promise.all([
      fetch(WEBAPP_URL + '?action=getSegments&token=' + SECRET_TOKEN),
      fetch(WEBAPP_URL + '?action=getAnnotations&token=' + SECRET_TOKEN)
    ]);
    const segData = await segRes.json();
    const annData = await annRes.json();
    if (segData.status !== 'ok') throw new Error(segData.message);
    if (annData.status !== 'ok') throw new Error(annData.message);

    videoList = segData.data.map(v => ({ ...v, start: parseTimeValue(v.start), end: parseTimeValue(v.end) }));
    allAnns = annData.data.map(r => ({
      video_id: String(r.video_id),
      time: Number(r.timestamp_ms) / 1000,
      category: r.category || '',
      note: r.note || '',
      annotator_id: String(r.annotator_id)
    }));
    annotators = [...new Set(allAnns.map(a => a.annotator_id))].filter(Boolean).sort();

    status.textContent = '로드 완료 ✓';
    document.getElementById('lastLoaded').textContent = new Date().toLocaleTimeString();
    document.getElementById('mainContent').classList.remove('hidden');
    buildUI();
  } catch(e) {
    status.textContent = '오류: ' + e.message;
  }
}

function buildUI() {
  renderOverview();
  renderProgress();
  renderCatPie();
  renderCatByAnnotator();
  renderAgreement();
  renderBoundaryPerVideo();
  buildSelects();
  renderCatByVideo();
  renderTimeline();
  renderGT();
}

// ── Tab ──
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['annotator','video'][i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

// ── Overview ──
function renderOverview() {
  const nonStart = allAnns.filter(a => a.time > 0);
  const totalTasks = videoList.length * Math.max(annotators.length, 1);
  const completedTasks = annotators.reduce((sum, aid) =>
    sum + videoList.filter(v => allAnns.some(a => a.video_id === v.video_id && a.annotator_id === aid && a.time === 0 && a.category)).length
  , 0);
  document.getElementById('statVideos').textContent = videoList.length;
  document.getElementById('statAnns').textContent = nonStart.length;
  document.getElementById('statAnnotators').textContent = annotators.length;
  const pct = totalTasks > 0 ? Math.round(completedTasks / totalTasks * 100) : 0;
  document.getElementById('statProgress').textContent = pct + '%';
  document.getElementById('statProgressSub').textContent = completedTasks + ' / ' + totalTasks + ' tasks';
}

// ── Progress ──
function renderProgress() {
  const total = videoList.length;
  document.getElementById('progressList').innerHTML = annotators.map(aid => {
    const done = videoList.filter(v =>
      allAnns.some(a => a.video_id === v.video_id && a.annotator_id === aid && a.time === 0 && a.category)
    ).length;
    const pct = total > 0 ? Math.round(done / total * 100) : 0;
    return `<div class="progress-row">
      <div class="progress-name">${aid}</div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"><span>${pct}%</span></div></div>
      <div class="progress-count">${done} / ${total}</div>
    </div>`;
  }).join('');
}

// ── Category pie ──
function renderCatPie() {
  const counts = Object.fromEntries(CATS.map(c => [c, 0]));
  allAnns.filter(a => a.category).forEach(a => { if (counts[a.category] != null) counts[a.category]++; });
  if (charts.catPie) charts.catPie.destroy();
  charts.catPie = new Chart(document.getElementById('chartCatPie'), {
    type: 'pie',
    data: { labels: CATS, datasets: [{ data: CATS.map(c => counts[c]), backgroundColor: CATS.map(c => CAT_COLOR[c]) }] },
    options: { plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } } }
  });
}

// ── Category by annotator ──
function renderCatByAnnotator() {
  if (charts.catByAnnotator) charts.catByAnnotator.destroy();
  charts.catByAnnotator = new Chart(document.getElementById('chartCatByAnnotator'), {
    type: 'bar',
    data: {
      labels: annotators,
      datasets: CATS.map(cat => ({
        label: cat,
        data: annotators.map(aid => allAnns.filter(a => a.annotator_id === aid && a.category === cat).length),
        backgroundColor: CAT_COLOR[cat]
      }))
    },
    options: {
      plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } },
      scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } }
    }
  });
}

// ── Agreement ──
function onAgreementTolChange() {
  const v = document.getElementById('agreementTol').value;
  document.getElementById('agreementTolVal').textContent = '±' + v + 's';
  renderAgreement();
}

function renderAgreement() {
  const tol = Number(document.getElementById('agreementTol').value);
  const grid = document.getElementById('agreementGrid');
  if (annotators.length < 2) { grid.innerHTML = '<div class="empty-msg">어노테이터가 2명 이상이어야 합니다.</div>'; return; }
  grid.innerHTML = videoList.map(v => {
    const vid = v.video_id;
    const pairs = [];
    for (let i = 0; i < annotators.length; i++) {
      for (let j = i + 1; j < annotators.length; j++) {
        const a1 = allAnns.filter(a => a.video_id === vid && a.annotator_id === annotators[i] && a.time > 0);
        const a2 = allAnns.filter(a => a.video_id === vid && a.annotator_id === annotators[j] && a.time > 0);
        if (!a1.length && !a2.length) continue;
        const matched = a1.filter(ann => a2.some(b => Math.abs(ann.time - b.time) <= tol)).length;
        const total = Math.max(a1.length, a2.length);
        if (total > 0) pairs.push(matched / total);
      }
    }
    if (!pairs.length) return `<div class="agreement-card"><div class="vid-id">${vid}</div><div style="font-size:11px;color:#aaa">데이터 없음</div></div>`;
    const score = pairs.reduce((s, v) => s + v, 0) / pairs.length;
    const pct = Math.round(score * 100);
    const color = pct >= 70 ? '#10b981' : pct >= 40 ? '#f59e0b' : '#ef4444';
    return `<div class="agreement-card">
      <div class="vid-id">${vid}</div>
      <div class="agreement-score">
        <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${pct}%;background:${color}"></div></div>
        <div class="score-val" style="color:${color}">${pct}%</div>
      </div>
    </div>`;
  }).join('');
}

// ── Boundary per video ──
function renderBoundaryPerVideo() {
  const vidIds = videoList.map(v => v.video_id);
  if (charts.boundaryPerVideo) charts.boundaryPerVideo.destroy();
  charts.boundaryPerVideo = new Chart(document.getElementById('chartBoundaryPerVideo'), {
    type: 'bar',
    data: {
      labels: vidIds,
      datasets: annotators.map((aid, i) => ({
        label: aid,
        data: vidIds.map(vid => allAnns.filter(a => a.video_id === vid && a.annotator_id === aid && a.time > 0).length),
        backgroundColor: ANNOTATOR_COLORS[i % ANNOTATOR_COLORS.length]
      }))
    },
    options: {
      plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } },
      scales: { x: { ticks: { font: { size: 10 }, maxRotation: 45 } }, y: { beginAtZero: true, ticks: { stepSize: 1 } } }
    }
  });
}

// ── Selects ──
function buildSelects() {
  const catSel = document.getElementById('catVideoAnnotator');
  catSel.innerHTML = '<option value="all">전체</option>' + annotators.map(a => `<option value="${a}">${a}</option>`).join('');

  const vidOpts = videoList.map(v => `<option value="${v.video_id}">${v.video_id}</option>`).join('');
  document.getElementById('timelineVideo').innerHTML = vidOpts;
  document.getElementById('gtVideo').innerHTML = vidOpts;

  const gtMin = document.getElementById('gtMinAgree');
  gtMin.max = annotators.length;
  gtMin.value = Math.max(2, Math.ceil(annotators.length / 2));
  document.getElementById('gtMinVal').textContent = gtMin.value + '명';
}

// ── Category by video ──
function renderCatByVideo() {
  const aid = document.getElementById('catVideoAnnotator').value;
  const vidIds = videoList.map(v => v.video_id);
  const filtered = aid === 'all' ? allAnns : allAnns.filter(a => a.annotator_id === aid);
  if (charts.catByVideo) charts.catByVideo.destroy();
  const canvas = document.getElementById('chartCatByVideo');
  canvas.style.height = '260px';
  canvas.style.width = Math.max(600, vidIds.length * 44) + 'px';
  charts.catByVideo = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: vidIds,
      datasets: CATS.map(cat => ({
        label: cat,
        data: vidIds.map(vid => filtered.filter(a => a.video_id === vid && a.category === cat).length),
        backgroundColor: CAT_COLOR[cat]
      }))
    },
    options: {
      plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } },
      scales: { x: { stacked: true, ticks: { font: { size: 10 }, maxRotation: 45 } }, y: { stacked: true, beginAtZero: true } },
      responsive: false, maintainAspectRatio: false
    }
  });
}

// ── Timeline ──
function renderTimeline() {
  const vid = document.getElementById('timelineVideo').value;
  const container = document.getElementById('timelineSvg');
  const seg = videoList.find(v => v.video_id === vid);
  if (!seg) { container.innerHTML = '<div class="empty-msg">영상 정보 없음</div>'; return; }
  container.innerHTML = buildTimelineSVG(vid, seg, annotators, false, 0, 0);
}

// ── GT ──
function onGTTolChange() {
  const v = document.getElementById('gtTolerance').value;
  document.getElementById('gtTolVal').textContent = '±' + v + 's';
  renderGT();
}
function onGTMinChange() {
  const v = document.getElementById('gtMinAgree').value;
  document.getElementById('gtMinVal').textContent = v + '명';
  renderGT();
}

function renderGT() {
  const vid = document.getElementById('gtVideo').value;
  const tol = Number(document.getElementById('gtTolerance').value);
  const minAgree = Number(document.getElementById('gtMinAgree').value);
  const container = document.getElementById('gtSvg');
  const seg = videoList.find(v => v.video_id === vid);
  if (!seg) { container.innerHTML = '<div class="empty-msg">영상 정보 없음</div>'; return; }

  // Build GT boundaries
  const gtBounds = computeGT(vid, tol, minAgree);

  // Legend
  const legend = document.getElementById('gtLegend');
  legend.innerHTML = annotators.map((aid, i) =>
    `<div class="gt-legend-item"><div class="gt-legend-dot" style="background:${ANNOTATOR_COLORS[i % ANNOTATOR_COLORS.length]}"></div><span>${aid}</span></div>`
  ).join('') +
  `<div class="gt-legend-item"><div class="gt-legend-dot" style="background:#1a1a2e;border-radius:2px;width:12px;height:4px;"></div><span>GT (≥${minAgree}명 동의)</span></div>`;

  container.innerHTML = buildTimelineSVG(vid, seg, annotators, true, tol, minAgree, gtBounds);
}

function computeGT(vid, tol, minAgree) {
  // Collect all non-start boundaries from all annotators
  const allBounds = allAnns.filter(a => a.video_id === vid && a.time > 0);
  if (!allBounds.length) return [];

  // Sort by time
  const sorted = [...allBounds].sort((a, b) => a.time - b.time);

  // Greedy clustering with tolerance window
  const clusters = [];
  const used = new Set();
  for (let i = 0; i < sorted.length; i++) {
    if (used.has(i)) continue;
    const cluster = [sorted[i]];
    used.add(i);
    for (let j = i + 1; j < sorted.length; j++) {
      if (used.has(j)) continue;
      if (sorted[j].time - sorted[i].time > tol * 2) break;
      if (Math.abs(sorted[j].time - sorted[i].time) <= tol) {
        cluster.push(sorted[j]);
        used.add(j);
      }
    }
    clusters.push(cluster);
  }

  // Filter clusters with enough unique annotators
  return clusters
    .filter(c => new Set(c.map(a => a.annotator_id)).size >= minAgree)
    .map(c => {
      const avgTime = c.reduce((s, a) => s + a.time, 0) / c.length;
      // Most common category in cluster
      const catCount = {};
      c.forEach(a => { if (a.category) catCount[a.category] = (catCount[a.category] || 0) + 1; });
      const topCat = Object.entries(catCount).sort((a,b) => b[1]-a[1])[0]?.[0] || '';
      return { time: avgTime, category: topCat, count: new Set(c.map(a => a.annotator_id)).size };
    });
}

function buildTimelineSVG(vid, seg, annotatorList, showGT, tol, minAgree, gtBounds) {
  const duration = seg.end - seg.start;
  const W = 820, ROW_H = 38, PAD_L = 72, PAD_R = 20, PAD_T = 16, TICK_H = 20;
  const rows = annotatorList.length + (showGT ? 1 : 0);
  const H = PAD_T + rows * ROW_H + TICK_H + 16;
  const BAR_W = W - PAD_L - PAD_R;
  const toX = t => PAD_L + (t / duration) * BAR_W;

  let svg = `<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="font-family:Inter,sans-serif">`;

  // Tick grid
  const tickCount = 10;
  for (let i = 0; i <= tickCount; i++) {
    const t = (duration / tickCount) * i;
    const x = toX(t);
    svg += `<line x1="${x}" y1="${PAD_T}" x2="${x}" y2="${H - TICK_H}" stroke="#f1f5f9" stroke-width="1"/>`;
    svg += `<text x="${x}" y="${H - 4}" text-anchor="middle" font-size="10" fill="#94a3b8">${fmt(t)}</text>`;
  }

  // Annotator rows
  annotatorList.forEach((aid, i) => {
    const y = PAD_T + i * ROW_H;
    const anns = allAnns.filter(a => a.video_id === vid && a.annotator_id === aid).sort((a,b) => a.time - b.time);
    const color = ANNOTATOR_COLORS[i % ANNOTATOR_COLORS.length];

    // Category fill
    for (let j = 0; j < anns.length; j++) {
      const x1 = toX(anns[j].time);
      const x2 = j + 1 < anns.length ? toX(anns[j+1].time) : toX(duration);
      const c = CAT_COLOR[anns[j].category] || '#cbd5e1';
      svg += `<rect x="${x1}" y="${y + 10}" width="${Math.max(0, x2-x1)}" height="18" fill="${c}" opacity="0.25"/>`;
    }

    // Bar outline
    svg += `<rect x="${PAD_L}" y="${y + 10}" width="${BAR_W}" height="18" fill="none" stroke="#e5e7eb" stroke-width="1" rx="2"/>`;

    // Label
    svg += `<text x="${PAD_L - 8}" y="${y + 23}" text-anchor="end" font-size="12" font-weight="600" fill="${color}">${aid}</text>`;

    // Boundary marks
    anns.filter(a => a.time > 0).forEach(ann => {
      const x = toX(ann.time);
      svg += `<line x1="${x}" y1="${y + 8}" x2="${x}" y2="${y + 30}" stroke="${color}" stroke-width="2"/>`;
      svg += `<circle cx="${x}" cy="${y + 8}" r="3" fill="${color}">`;
      svg += `<title>${fmt(ann.time)} — ${ann.category}${ann.note ? ' | ' + ann.note : ''}</title></circle>`;
    });
  });

  // GT row
  if (showGT && gtBounds) {
    const y = PAD_T + annotatorList.length * ROW_H;
    svg += `<rect x="${PAD_L}" y="${y + 10}" width="${BAR_W}" height="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" rx="2"/>`;
    svg += `<text x="${PAD_L - 8}" y="${y + 23}" text-anchor="end" font-size="12" font-weight="700" fill="#1a1a2e">GT</text>`;

    // Tolerance shading behind each GT mark
    gtBounds.forEach(gt => {
      const cx = toX(gt.time);
      const tw = (tol / duration) * BAR_W;
      svg += `<rect x="${Math.max(PAD_L, cx - tw)}" y="${y + 10}" width="${Math.min(tw * 2, BAR_W)}" height="18" fill="#1a1a2e" opacity="0.06"/>`;
    });

    // Category fill for GT
    for (let j = 0; j < gtBounds.length; j++) {
      const x1 = toX(gtBounds[j].time);
      const x2 = j + 1 < gtBounds.length ? toX(gtBounds[j+1].time) : toX(duration);
      const c = CAT_COLOR[gtBounds[j].category] || '#cbd5e1';
      svg += `<rect x="${x1}" y="${y + 10}" width="${Math.max(0, x2-x1)}" height="18" fill="${c}" opacity="0.2"/>`;
    }

    gtBounds.forEach(gt => {
      const x = toX(gt.time);
      svg += `<line x1="${x}" y1="${y + 6}" x2="${x}" y2="${y + 32}" stroke="#1a1a2e" stroke-width="2.5"/>`;
      svg += `<polygon points="${x},${y+4} ${x-4},${y+10} ${x+4},${y+10}" fill="#1a1a2e">`;
      svg += `<title>${fmt(gt.time)} — ${gt.category} (${gt.count}명 동의)</title></polygon>`;
    });
  }

  svg += '</svg>';
  return svg;
}
</script>
