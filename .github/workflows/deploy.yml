name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject environment variables
        run: |
          sed -i "s|%%WEBAPP_URL%%|${{ secrets.WEBAPP_URL }}|g" annotation_tool_yt.html
          sed -i "s|%%SECRET_TOKEN%%|${{ secrets.SECRET_TOKEN }}|g" annotation_tool_yt.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
